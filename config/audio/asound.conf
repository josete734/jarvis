# Optional stable ALSA naming for the host (NOT used inside containers by default).
# Find your card names:  cat /proc/asound/cards   |   arecord -l && aplay -l
# Then: sudo cp config/audio/asound.conf /etc/asound.conf  (edit CARD= first)
#
# The orchestrator normally selects devices by PyAudio index instead
# (AUDIO_INPUT_INDEX / AUDIO_OUTPUT_INDEX in .env; list with `make list-audio`).

pcm.jarvis_mic {
    type plug
    slave.pcm "hw:CARD=Device,DEV=0"     # TODO: your USB mic/speakerphone card name
}

pcm.jarvis_spk {
    type plug
    slave.pcm "hw:CARD=Device,DEV=0"     # TODO: your USB speaker card name
}
