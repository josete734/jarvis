# ALSA para el orchestrator con el Anker PowerConf por USB-C.
# Un solo dispositivo USB con micro + altavoz y cancelacion de eco por HARDWARE,
# por eso NO se usa AEC software (SW_AEC=false) y el barge-in queda activo.
# Se referencia por NOMBRE de tarjeta (CARD=PowerConf), estable entre reinicios.
# 'plug' adapta tasas: captura 16 kHz (openWakeWord/whisper), salida 22050 (Piper).

pcm.jarvisin {
    type plug
    slave.pcm "hw:CARD=PowerConf,DEV=0"
    hint { show on description "jarvisin" }
}

pcm.jarvisout {
    type plug
    slave.pcm "hw:CARD=PowerConf,DEV=0"
    hint { show on description "jarvisout" }
}

pcm.!default {
    type asym
    playback.pcm "plug:jarvisout"
    capture.pcm  "plug:jarvisin"
}
