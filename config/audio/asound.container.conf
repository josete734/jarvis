# ALSA default para el contenedor orchestrator (Fase 1).
# Asimétrico: reproducción -> jack 3.5mm de la placa (ALC233, tarjeta "PCH"),
#             captura      -> micro USB EMEET PIXY (tarjeta "PIXY").
#
# IMPORTANTE: se referencia por NOMBRE de tarjeta (CARD=PIXY / CARD=PCH), NO por número.
# Los números (card 0/1) NO son estables entre reinicios (el orden USB vs PCH cambia);
# los nombres sí. 'plughw' envuelve cada uno con el plugin 'plug' para que PortAudio
# pueda abrirlos a 16 kHz (captura) / 22,05 kHz (reproducción) aunque el hardware vaya
# a 44,1/48 kHz: ALSA remuestrea. El micro del headset en el jack combo no capta, por
# eso la entrada usa la webcam USB.
pcm.!default {
    type asym
    playback.pcm "plughw:CARD=PCH,DEV=0"
    capture.pcm  "plughw:CARD=PIXY,DEV=0"
}
