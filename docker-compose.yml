# Pinned versions verified jun-2026; items marked "verify" in Â§13 of the plan.
name: jarvis

x-logging: &default-logging
  driver: json-file
  options: { max-size: "10m", max-file: "3" }

services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:v1.88.1   # tag estable verificado (jun-2026; *-stable se descontinuÃ³ en 1.83.x)
    restart: unless-stopped
    volumes: ["./config/litellm/config.yaml:/app/config.yaml:ro"]
    env_file: .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    logging: *default-logging
    healthcheck:                                       # la imagen (wolfi) NO trae curl; sonda con python3
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  chroma:
    image: chromadb/chroma:1.5.9
    restart: unless-stopped
    volumes: ["/srv/jarvis/chroma:/data"]          # 1.x breaking change: /data
    logging: *default-logging

  searxng:
    image: searxng/searxng:2026.6.11-1957876dd     # tag datado verificado (jun-2026)
    restart: unless-stopped
    environment: ["SEARXNG_SECRET=${SEARXNG_SECRET}"]
    volumes: ["./config/searxng:/etc/searxng:ro"]
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASS}
    volumes: ["/srv/jarvis/postgres:/var/lib/postgresql/data"]
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 30s
      timeout: 5s
      retries: 3

  n8n:
    image: n8nio/n8n:2.26.2                        # Ãºltimo estable multi-arch verificado (jun-2026)
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=n8n                      # el superusuario de postgres es 'n8n', no 'postgres' (fix S4)
      - DB_POSTGRESDB_DATABASE=n8n                  # sin esto n8n usaba db/user 'postgres' (inexistente) -> 440 reinicios
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASS}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=true
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=${TZ}
    ports: ["127.0.0.1:5678:5678"]                 # exposed to tailnet via `tailscale serve` (TLS)
    volumes: ["/srv/jarvis/n8n:/home/node/.n8n"]
    depends_on:
      postgres: { condition: service_healthy }
    logging: *default-logging

  orchestrator:
    build: ./services/orchestrator
    restart: unless-stopped
    devices: ["/dev/snd:/dev/snd"]                 # Anker PowerConf por USB = tarjeta ALSA "PowerConf"
    group_add: ["audio"]
    extra_hosts: ["host.docker.internal:host-gateway"]   # para llegar al puente de investigaciÃ³n (Claude Code en el host)
    ports: ["127.0.0.1:8070:8070"]                 # events: el puente del host llama a /event/say (voz proactiva)
    volumes:
      - /var/lib/jarvis/models:/models             # models live on the M.2 (NVMe)
      - /srv/jarvis/mem0:/data/mem0                # history.db local de mem0 (persistente; Fase 3)
      - ./prompts:/prompts:ro
      - ./persona:/persona:ro
      - ./config:/config:ro
      - /srv/jarvis/logs:/logs
      - ./config/audio/asound.container.conf:/etc/asound.conf:ro   # default ALSA asimÃ©trico: mic PIXY (in) + auriculares jack (out)
    environment:
      - LLM_BASE=http://litellm:4000/v1
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - SEARX=http://searxng:8080
      - N8N_BASE=http://n8n:5678
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - EVENTS_SECRET=${EVENTS_SECRET}
      - MEM0_DIR=/data/mem0
      - VISION_BASE=http://vision:8089
      # --- Audio: modo Anker PowerConf (AEC por HARDWARE) ---
      - SW_AEC=false                               # sin AEC software (el Anker cancela el eco); true para micro+altavoz separados
      - DISABLE_BARGE_IN=true                       # sala con voz de fondo (pareja, ruido) interrumpe el TTS; el bot termina su frase
      - WAKE_THRESHOLD=0.2                         # Anker: su DSP baja el score del wake word (pico ~0.29); umbral 0.5->0.2
      - AEC_STREAM_DELAY_MS=290                     # (solo si SW_AEC=true) retardo loopback medido con altavoces ON
      - AEC_NS=false                               # (solo si SW_AEC=true) NS del APM rompe el wake word con el ruido alto del Yeti
      - AEC_HPF=false
      - STT_BACKEND=whisper                        # Whisper small (multilingÃ¼e ES); Parakeet de la imagen era solo-inglÃ©s (regresiÃ³n)
      - STT_TUNED=true                             # TunedWhisperSTTService: tuning es-ES (initial_prompt+beam5+condition_off); medido mejor en voz real
      - STT_BASE_URL=http://stt-parakeet:5092/v1   # puerto verificado del servidor parakeet
      - WHISPER_MODEL=medium                       # medium INT8: RTF 0.22 medido -> ~0.9s/frase corta (los 6-7s previos eran por segmentos ~20s del bug stop_secs, ya resuelto con smart-turn). Mejor calidad es-ES (tildes/puntuaciÃ³n). small=RTF0.08; large-v3-turbo=RTF0.31 sin ganancia visible
      - WHISPER_CPU_THREADS=12                      # CPU ociosa (LLM en nube) -> usa los 12 hilos
      - PIPER_VOICE=es_ES-davefx-medium            # respaldo offline
      # --- Voz: Piper local (davefx-medium, es-ES). ElevenLabs retirado: 100% self-hosted ---
      - TTS_BACKEND=piper                          # local (ElevenLabs fuera; XTTS pendiente de GPU)
      - AUDIO_OUT_RATE=22050                        # nativo de Piper davefx-medium (evita remuestreo extra)
      - WAKE_MODEL_PATH=/models/openwakeword/hey_mycroft_v0.1.onnx
      - WAKE_TIMEOUT_SECS=45
      - MEM0_ENABLED=false                         # switch to true in Fase 3
      - EVENTS_PORT=8070
      - RESEARCH_BRIDGE=http://host.docker.internal:8077   # puente a Claude Code (investigaciones)
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}                  # push de avisos al mÃ³vil (bot mycroft_neo_bot)
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID:-342573153}  # Fase A: solo responde a este chat (JosÃ©)
      - PROACTIVE_ECHO_TELEGRAM=${PROACTIVE_ECHO_TELEGRAM:-false}  # Fase B: avisos 'info' al mÃ³vil aun estando presente
      - HF_HOME=/models/hf                         # whisper/e5 caches persist on NVMe
      - AUDIO_INPUT_INDEX=${AUDIO_INPUT_INDEX}
      - AUDIO_OUTPUT_INDEX=${AUDIO_OUTPUT_INDEX}
      - TZ=${TZ}
    depends_on: [litellm, chroma, searxng, n8n]
    logging: *default-logging

  stt-parakeet:                                    # Fase 2-3 (PLAN_FINAL Â§3.4)
    image: ghcr.io/achetronic/parakeet:0.5.0-int8  # GHCR no publica "v0.5.0"; el sufijo de precisiÃ³n es obligatorio
    profiles: ["stt-parakeet"]
    restart: unless-stopped
    # -models /models obligatorio (modelos horneados en la imagen); -workers 2 â‰ˆ 1.3 GB RAM
    command: ["-port", "5092", "-models", "/models", "-workers", "2", "-log-format", "json"]
    logging: *default-logging
    healthcheck:                                   # la imagen NO trae curl; sonda por /dev/tcp
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5092 && printf 'GET /health HTTP/1.0\r\n\r\n' >&3 && grep -q ok <&3"]
      interval: 30s
      timeout: 5s
      retries: 3

  vision:
    build: ./services/vision
    restart: unless-stopped
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/dri/renderD128:/dev/dri/renderD128"
    group_add: ["video", "${RENDER_GID:-989}"]     # getent group render (Â§13.7)
    volumes:
      - /var/lib/jarvis/models:/models
      - /srv/jarvis/faces:/faces                   # known-person embeddings (Fase 5)
    environment:
      - OPENVINO_DEVICE=GPU
      - DETECT_FPS=2
      - YOLO_MODEL_DIR=/models/yolo11n_int8_320_openvino
      - FACE_PACK=buffalo_sc
      - INSIGHTFACE_HOME=/models/insightface
      - ORCHESTRATOR_EVENTS=http://orchestrator:8070
      - EVENTS_SECRET=${EVENTS_SECRET}
      - DISABLE_PRESENCE=true                      # switch to false in Fase 5
    logging: *default-logging

  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2   # el tag lleva prefijo 'v' (0.4.2 sin v no existe en Docker Hub)
    restart: unless-stopped
    environment: [CONTAINERS=1, LOGS=1]            # GET/HEAD only (POST=0 default); LOGS para el visor del panel
    volumes: ["/var/run/docker.sock:/var/run/docker.sock:ro"]
    logging: *default-logging

  panel:
    build: ./services/panel
    restart: unless-stopped
    ports: ["127.0.0.1:8080:8080"]                 # exposed to tailnet via `tailscale serve` (identity+TLS)
    environment:
      - DOCKER_HOST=tcp://socket-proxy:2375
      - PANEL_ALLOWED_USERS=${PANEL_ALLOWED_USERS}
      - PANEL_PASSWORD=${PANEL_PASSWORD}
      - EVENTS_SECRET=${EVENTS_SECRET}
      - ORCHESTRATOR_EVENTS=http://orchestrator:8070
      - TZ=${TZ}
      - HUD_CALENDAR_ICS=${HUD_CALENDAR_ICS:-}        # URL ICS secreta (Google Calendar iCal privado) para la agenda del HUD
      - HUD_WEATHER_LAT=${HUD_WEATHER_LAT:-41.1549}   # tiempo del HUD (Reus por defecto)
      - HUD_WEATHER_LON=${HUD_WEATHER_LON:-1.1087}
      - HUD_WEATHER_PLACE=${HUD_WEATHER_PLACE:-Reus}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}            # widget Now Playing
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REDIRECT=${SPOTIFY_REDIRECT:-https://jarvis.calahierbas.casa/spotify/callback}
    volumes:
      - /srv/jarvis/logs:/logs
      - ./persona:/persona                         # rw: panel edits; orchestrator mounts :ro
      - ./config:/config
      - /mnt/storage:/mnt/storage:ro               # solo para mÃ©trica de uso del disco SATA
    depends_on: [orchestrator, socket-proxy]
    logging: *default-logging

  cloudflared:                                   # tunnel saliente a Cloudflare (sin abrir puertos)
    image: cloudflare/cloudflared:2025.11.1      # cliente del tunnel "calahierbas"; ingress remoto (jarvis -> panel)
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment: ["TUNNEL_TOKEN=${TUNNEL_TOKEN}"]
    depends_on: [panel]
    logging: *default-logging

  reflection:
    build: ./services/reflection
    profiles: ["jobs"]                             # launched by systemd timer at 04:00
    environment:
      - LLM_BASE=http://litellm:4000/v1
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - TZ=${TZ}
    volumes:
      - /srv/jarvis/logs:/logs
      - ./persona:/persona
      - ./prompts:/prompts:ro
    depends_on: [litellm, chroma]
    logging: *default-logging
